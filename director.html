<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Director</title>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap");

        .stock-header,
        .stock-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stock-list {
            max-height: 250px;
            overflow-y: auto !important;
            display: block;
            padding-right: 10px;
            margin-bottom: 20px;
            pointer-events: all !important;
        }

        .stock-list::-webkit-scrollbar {
            width: 4px;
        }

        .stock-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .add-flower-form {
            border: 1px solid var(--border);
            border-radius: var(--r);
            position: relative;
            z-index: 10;
            pointer-events: all !important;
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--glass);
            padding: 15px;
            margin-top: 10px;
        }

        .add-flower-form h3 {
            font-size: 14px;
            margin-bottom: 0;
            color: var(--text);
            white-space: nowrap;
        }

        .add-flower-form input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            width: 100%;
            /* Щоб вони рівномірно заповнювали місце */
        }

        .add-flower-form input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .add-flower-form .btn {
            background: var(--text);
            /* Біла кнопка */
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .add-flower-form .btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .add-flower-form .btn:active {
            transform: translateY(0);
        }

        .stock-header-right,
        .stock-item-right {
            display: flex;
            gap: 40px;
            /* Відстань між розміром та кількістю */
            min-width: 150px;
            justify-content: flex-end;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--muted);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        :root {
            --bg: #0b0b0b;
            --text: #fff;
            --muted: rgba(255, 255, 255, .7);

            --glass: rgba(255, 255, 255, .08);
            --panel: rgba(255, 255, 255, .10);

            --border: rgba(255, 255, 255, .18);
            --border2: rgba(255, 255, 255, .14);

            --r: 18px;
            --shadow: 0 18px 50px rgba(0, 0, 0, .55);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 28px 14px;
        }

        .wrap {
            width: min(760px, 100%);
        }

        .header {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--r);
            background: var(--glass);
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Tabs container */
        .tabs {
            border: 1px solid var(--border);
            border-radius: var(--r);
            background: var(--glass);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Hide radios */
        .tabs>input {
            display: none;
        }

        .tab-head {
            display: flex;
            gap: 10px;
            padding: 12px 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .12);
        }

        /* Curtain buttons */
        .tab {
            cursor: pointer;
            user-select: none;
            padding: 12px 16px;
            border-radius: 16px 16px 10px 10px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .06);
            color: rgba(255, 255, 255, .78);
            font-size: 13px;
            font-weight: 600;
            transform: translateY(6px);
            transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
            position: relative;
            overflow: hidden;
        }

        /* subtle “folds” */
        .tab::before {
            content: "";
            position: absolute;
            inset: -18px -18px 0 -18px;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, .18) 0%,
                    rgba(255, 255, 255, .05) 14%,
                    rgba(255, 255, 255, .15) 28%,
                    rgba(255, 255, 255, .05) 42%,
                    rgba(255, 255, 255, .15) 56%,
                    rgba(255, 255, 255, .05) 70%,
                    rgba(255, 255, 255, .15) 84%,
                    rgba(255, 255, 255, .18) 100%);
            opacity: .10;
            pointer-events: none;
        }

        /* Active tab (connected with underlay) */
        #tab-stock:checked~.tab-head label[for="tab-stock"],
        #tab-bouquets:checked~.tab-head label[for="tab-bouquets"] {
            transform: translateY(0);
            background: rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .98);
            border-color: rgba(255, 255, 255, .30);
            border-bottom-color: transparent;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        /* UNDERLAY (the “background” that goes down from the button) */
        .underlay {
            margin: 0 12px 12px;
            border: 1px solid var(--border2);
            border-top: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .07));
            box-shadow: 0 18px 40px rgba(0, 0, 0, .35);
            overflow: hidden;
            pointer-events: none;
            max-height: 0;
            transition: max-height .26s ease;
            height: auto;
            max-height: none !important;
            overflow: visible !important;
        }

        /* Open underlay when any tab is selected */
        #tab-stock:checked~.underlay,
        #tab-bouquets:checked~.underlay {
            max-height: 320px;
            /* enough for content */
        }

        /* Change top corner depending on which button is active (looks like it “starts” from that tab) */
        #tab-stock:checked~.underlay {
            max-height: fit-content;
            min-height: 320px;
        }

        #tab-bouquets:checked~.underlay {
            border-radius: 16px 0 16px 16px;
        }

        /* panes */
        .pane {
            display: none;
            padding: 18px;
            color: rgba(255, 255, 255, .92);
            font-size: 13px;
            line-height: 1.45;
        }

        /* show + animate pane on click */
        #tab-stock:checked~.underlay .pane-stock {
            display: block;
            animation: drop .22s ease;
        }

        #tab-bouquets:checked~.underlay .pane-bouquets {
            display: block;
            animation: drop .22s ease;
        }

        @keyframes drop {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint {
            margin-top: 8px;
            color: rgba(255, 255, 255, .65);
            font-size: 12px;
        }

        @media (max-width: 520px) {
            .tab {
                padding: 12px 14px;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <h1>Сторінка директора</h1>
        </div>

        <section class="tabs">
            <!-- Якщо хочеш, щоб “Склад” був відкритий одразу: додай checked сюди -->
            <input type="radio" name="tabs" id="tab-stock" />
            <input type="radio" name="tabs" id="tab-bouquets" />

            <div class="tab-head">
                <label class="tab" for="tab-stock">Склад</label>
                <label class="tab" for="tab-bouquets">Букети</label>
            </div>

            <div class="underlay">
                <div class="pane pane-stock">
                    <div class="stock-controls">
                        <input type="text" id="flower-search" placeholder="Пошук квітки..." class="search-input">
                    </div>

                    <div class="stock-header">
                        <span>Назва квітки</span>
                        <div class="stock-header-right">
                            <span>Розмір</span>
                            <span>Кількість</span>
                        </div>
                    </div>

                    <div id="stock-list" class="stock-list">
                    </div>
                    <form id="flower-form" class="add-flower-form">
                        <h3>Додати нову квітку</h3>
                        <input type="text" id="new-flower-name" placeholder="Назва" required>
                        <input type="text" id="new-flower-size" placeholder="Розмір" required>
                        <input type="number" id="new-flower-count" placeholder="Кількість" required>
                        <button type="submit" id="add-flower-btn" class="btn">Додати на склад</button>
                    </form>
                    <div class="pane pane-bouquets">
                        Тут буде розділ <b>букети</b>.
                    </div>
                </div>
        </section>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
