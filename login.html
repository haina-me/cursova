<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap");

        :root {
            --white: #fff;
            --bg: #0b0b0b;
            --glass: rgba(255, 255, 255, .08);
            --border: rgba(255, 255, 255, .35);
            --font: "Poppins", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            color: var(--white);
            background: var(--bg);
        }

        .login {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* фон-градієнт замість картинки (щоб не залежати від файлів) */
        .login::before {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(circle at 20% 20%, rgba(129, 96, 117, 0.25), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(255, 120, 228, 0.18), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(255, 120, 246, 0.18), transparent 45%);
            filter: blur(18px);
            transform: rotate(10deg);
        }

        .card {
            position: relative;
            width: min(420px, 100%);
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            backdrop-filter: blur(10px);
            box-shadow: 0 16px 60px rgba(0, 0, 0, .55);
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        .field {
            margin-top: 14px;
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 13px;
            opacity: .9;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(0, 0, 0, .25);
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: rgba(255, 255, 255, .45);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, .08);
        }

        .row {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            opacity: .95;
        }

        .row a {
            color: #fff;
            opacity: .9;
            text-decoration: none;
        }

        .row a:hover {
            text-decoration: underline;
        }

        .btn {
            margin-top: 18px;
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            background: #fff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            filter: brightness(.95);
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            opacity: .95;
        }

        .footer a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .hint {
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            opacity: .7;
        }
    </style>
</head>

<body>
    <div class="login">
        <form class="card">
            <h1>Login</h1>

            <div class="field">
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" />
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" />
            </div>

            <button id="loginButton" class="btn" type="submit">Login</button>

        </form>
    </div>

    <script type="module" src="./src/main.js"></script>

</body>

</html>
